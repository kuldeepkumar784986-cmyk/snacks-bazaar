<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snack Bazaar | Sweet Chilli Kurkure</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Han+Sans&family=DM+Sans:wght@400;600;700&family=Nunito:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/nav.css">
  <link rel="stylesheet" href="/css/footer.css">
  <link rel="stylesheet" href="/css/product.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <link rel="stylesheet" href="/css/checkout.css">
</head>
<body>

  <nav class="nav">
    <button class="hamburger" aria-label="Menu">☰</button>
    <div class="nav__left">
      <a href="/shop.html">Shop</a>
      <a href="/our-story.html">Our Story</a>
    </div>
    <div class="nav__center">
      <a href="/index.html" class="logo"><span class="logo-box"><span class="logo-wordmark"><span class="logo-icon">🍿</span><span class="logo-snack">SNACK</span><span class="logo-bazaar">BAZAAR</span></span><span class="logo-tagline">India's Snack Hub</span></span></a>
    </div>
    <div class="nav__right">
      <a href="/one-feeds-two.html">One Feeds Two</a>
      <a href="/find-ollys.html">Find Us</a>
      <a href="javascript:void(0)" aria-label="Account">👤</a>
      <a href="/wishlist.html" aria-label="Wishlist" style="position:relative;">❤️ <span class="wishlist-count hidden" style="position:absolute; top:-8px; right:-12px; background:#ff4e00; color:white; min-width:20px; height:20px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700; padding:0 4px; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.2); transition:opacity 0.2s, transform 0.2s;">0</span></a>
      <a href="javascript:void(0)" aria-label="Cart" onclick="openCart()">🛒 <span class="cart-count">0</span></a>
    </div>
  </nav>

  <!-- Breadcrumbs -->
  <div style="max-width:1200px; margin: 2rem auto 0; padding: 0 5%;">
    <a href="/" style="color:#666; text-decoration:none; font-family:var(--font-body);">Home</a>
    <span style="color:#ccc; margin:0 0.5rem;">›</span>
    <button onclick="history.back()" style="color:#666; text-decoration:none; font-family:var(--font-body); background:none; border:none; cursor:pointer; padding:0; font-size:1rem;">Shop</button>
    <span style="color:#ccc; margin:0 0.5rem;">›</span>
    <span id="breadcrumb-title" style="color:var(--color-primary); font-family:var(--font-body); font-weight:700;">Loading...</span>
  </div>

  <section class="product-detail reveal" id="productContainer">
    <!-- JS will populate layout here, or show loading state -->
    <div style="text-align:center; padding: 6rem; width:100%; color:#888;">
      Loading product details...
    </div>
  </section>

  <!-- You may also like -->
  <section class="related-products" style="max-width:1200px; margin: 4rem auto; padding: 0 5%;">
    <h2 style="font-family:var(--font-display); font-size:2rem; color:var(--color-purple-deep); margin-bottom:1.5rem;">YOU MAY ALSO LIKE</h2>
    <div class="shop-grid" id="relatedGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:1.5rem;">
      <!-- Related injected here -->
    </div>
  </section>

  <!-- Mini Cart Drawer -->
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer__header">
      <h3>YOUR CART</h3>
      <button onclick="closeCart()">✕</button>
    </div>
    <div class="cart-drawer__items" id="cartItems"></div>
    <div class="cart-drawer__footer">
      <div class="cart-subtotal">
        <span>Subtotal</span>
        <span id="cartTotal">₹0.00</span>
      </div>
      <button class="btn-add-to-cart btn-checkout" onclick="openCheckout()">CHECKOUT</button>
    </div>
  </div>
  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="/js/api-config.js"></script>
  <script src="/js/wishlist.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/animations.js"></script>
  <script src="/js/product.js"></script>
</body>
</html>
